<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ling Du OG Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=IBM+Plex+Mono:wght@500&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --paper: #f7f7f4;
      --ink: #181512;
      --muted: #60584d;
      --line: rgba(24, 21, 18, 0.12);
      --accent: #a06642;
      --moss: #67715f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: linear-gradient(180deg, #fbfbfa 0%, var(--paper) 100%);
      color: var(--ink);
      font-family: "Space Grotesk", sans-serif;
    }

    .frame {
      width: 100%;
      height: 100%;
      padding: 28px 36px 36px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .brand-mark {
      font: 700 44px/1 "Cormorant Garamond", serif;
    }

    .brand-copy strong {
      display: block;
      font-size: 24px;
    }

    .brand-copy span,
    .pill,
    .eyebrow,
    .meta,
    .summary-label {
      font: 500 14px/1.2 "IBM Plex Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pill {
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
    }

    .content {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 34px;
      align-items: stretch;
    }

    .hero {
      display: grid;
      align-content: start;
      gap: 22px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .eyebrow::before {
      content: "";
      width: 48px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      margin: 0;
      font: 700 106px/0.86 "Cormorant Garamond", serif;
      letter-spacing: -0.05em;
      max-width: 6.5ch;
    }

    h1 span {
      color: var(--accent);
      font-style: italic;
    }

    .summary {
      display: grid;
      align-content: space-between;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }

    .summary-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }

    .summary-head strong {
      font-size: 16px;
    }

    .summary-head span {
      color: var(--muted);
      font: 500 14px/1.2 "IBM Plex Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .summary-copy {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .summary-copy h2 {
      margin: 0;
      font: 600 68px/0.88 "Cormorant Garamond", serif;
      letter-spacing: -0.05em;
      max-width: 6ch;
    }

    .summary-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 24px;
      line-height: 1.45;
    }

    .meta {
      display: grid;
      gap: 10px;
      margin-top: 20px;
      color: var(--moss);
    }
  </style>
</head>
<body>
  <div class="frame">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">L</div>
        <div class="brand-copy">
          <strong>Ling Du</strong>
          <span>Independent builder / design + code</span>
        </div>
      </div>
      <div class="pill">lingdu0007.github.io</div>
    </header>

    <main class="content">
      <section class="hero">
        <div class="eyebrow">Editorial minimal / Swiss grid</div>
        <h1>把设计、代码和产品感<span>连成一个系统。</span></h1>
      </section>

      <aside class="summary">
        <div>
          <div class="summary-head">
            <strong>重点案例</strong>
            <span>Flow Atlas / 2026</span>
          </div>
          <div class="summary-copy">
            <h2>让活跃系统在高密度状态里保持安静。</h2>
            <p>产品设计、前端工程、AI 工作流与品牌叙事的交叉实践。</p>
          </div>
        </div>

        <div class="meta">
          <div class="summary-label">Work / Notes / Contact</div>
          <div>https://lingdu0007.github.io/</div>
        </div>
      </aside>
    </main>
  </div>
</body>
</html>
