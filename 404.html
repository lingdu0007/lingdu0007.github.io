<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>页面未找到 | Ling Du</title>
  <meta name="robots" content="noindex" />
  <meta http-equiv="refresh" content="4; url=/" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --paper: #f7f7f4;
      --ink: #181512;
      --muted: #60584d;
      --line: rgba(24, 21, 18, 0.14);
      --accent: #a06642;
      --title: "Cormorant Garamond", serif;
      --body: "Space Grotesk", sans-serif;
      --mono: "IBM Plex Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #fbfbfa 0%, var(--paper) 100%);
      color: var(--ink);
      font-family: var(--body);
    }

    .card {
      width: min(100%, 720px);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--accent);
      font: 500 0.78rem/1.2 var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font: 600 clamp(2.8rem, 10vw, 4.8rem)/0.95 var(--title);
      letter-spacing: -0.04em;
    }

    p {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 40ch;
    }

    a {
      display: inline-flex;
      align-items: center;
      margin-top: 24px;
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">404 / Not Found</p>
    <h1>这个页面不存在。</h1>
    <p>
      你访问的地址可能已经变更，或者这个链接本来就不属于当前站点。
      4 秒后会自动返回首页，也可以直接点下面的按钮。
    </p>
    <a href="/">返回首页</a>
  </main>
</body>
</html>
